<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likes PartII</title>
    <link rel="stylesheet" href="./style2.css">
</head>
<body>
<div class="nav-bar">
        <h1>Network</h1>
    </div>

    <h2 class="feed-title">Your Feed</h2>

    <div class="main-container">
        
        <div class="profile-box">
            <div class="avatar-placeholder">
                <img src="./assests/Untitled.jpg" alt="profile-pic"></img>
            </div>
            <a href="#" class="avatar-link">Add an avatar</a>
            <h3>James Doe</h3>
        </div>

        <div class="feed-column">
            
            <div class="post-card">
                <div class="post-header">
                    <h3>Neil M</h3>
                    <div class="like-section">
                        <span id="like-count-0">9</span> like(s)
                        <button onclick="addLike(0, '#like-count-0')">Like</button>
                    </div>
                </div>
                <p>I just set up this new discord bot, let me know what you all think. <a href="#">link</a></p>
            </div>

            <div class="post-card">
                <div class="post-header">
                    <h3>Nichole K</h3>
                    <div class="like-section">
                        <span id="like-count-1">12</span> like(s)
                        <button onclick="addLike(1, '#like-count-1')">Like</button>
                    </div>
                </div>
                <p>Just finished my <a href="#">next comic</a>, check it out.</p>
            </div>

            <div class="post-card">
                <div class="post-header">
                    <h3>Jim R</h3>
                    <div class="like-section">
                        <span id="like-count-2">9</span> like(s)
                        <button onclick="addLike(2, '#like-count-2')">Like</button>
                    </div>
                </div>
                <p>I can't stop listening to the <a href="#">new album</a>. Who else is liking it?</p>
            </div>

        </div>
    </div>
    <script src="./main2.js"></script> 
</body>
</html>
